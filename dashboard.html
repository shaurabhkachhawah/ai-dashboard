<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>Admin Dashboard</h1>
</header>

<div class="container">

<div class="card">

<h3>Add Promotion Income</h3>

<input id="brand" placeholder="Brand Name">
<input id="amount" placeholder="Amount">
<input id="method" placeholder="Payment Method">

<button onclick="addPromotion()">Save</button>

</div>


<div class="card">

<h3>Total Income</h3>

<h2 id="totalIncome">0</h2>

</div>


<div class="card">

<h3>Promotion List</h3>

<div id="promotionList"></div>

</div>


<div class="card">

<h3>Income Chart</h3>

<canvas id="incomeChart"></canvas>

</div>


</div>

<script type="module" src="app.js"></script>

</body>
</html>
